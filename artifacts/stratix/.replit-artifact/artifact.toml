kind = "web"
previewPath = "/"
title = "Stratix Intelligence Platform"
version = "1.0.0"
id = "artifacts/stratix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24134

[services.development]
run = "pnpm --filter @workspace/stratix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stratix", "run", "build" ]
publicDir = "artifacts/stratix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24134"
BASE_PATH = "/"
